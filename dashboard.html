<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CAS CV Builder — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <!-- Hidden until auth-guard.js confirms sign-in — prevents a
       flash of the dashboard before the async auth check resolves -->
  <style>body{visibility:hidden}</style>
</head>
<body class="page-dashboard">

  <!-- Header -->
  <header class="dash-header">
    <div class="dash-header-inner">
      <div class="header-brand">
        <span class="brand-cas">CAS</span>
        <span class="brand-divider"></span>
        <span class="brand-sub">CV Builder</span>
      </div>
      <button class="btn-logout" id="logoutBtn">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sign Out
      </button>
    </div>
  </header>

  <!-- Main -->
  <main class="dash-main">
    <div class="dash-container">

      <!-- Top bar -->
      <div class="dash-top">
        <div class="dash-top-left">
          <h1 class="dash-title">Your CVs</h1>
          <p class="dash-subtitle" id="cvCount">0 CVs saved</p>
        </div>
        <button class="btn-new" id="newCvBtn">
          <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          New CV
        </button>
      </div>

      <!-- Gallery -->
      <div class="cv-gallery" id="cvGallery">

        <!-- Empty state -->
        <div class="empty-state" id="emptyState">
          <div class="empty-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
          </div>
          <h2 class="empty-heading">No CVs yet</h2>
          <p class="empty-text">Create your first CV to get started</p>
          <button class="btn-new" id="newCvBtnEmpty">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Create New CV
          </button>
        </div>

        <!-- CV cards rendered by JS -->
        <div class="cv-grid" id="cvGrid"></div>

      </div>
    </div>
  </main>

  <!-- New CV Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="newCvModal">
      <div class="modal-header">
        <h2 class="modal-title">Create New CV</h2>
        <button class="modal-close" id="modalClose" aria-label="Close modal">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <p class="modal-caption">How would you like to start?</p>
        <div class="modal-options">

          <button class="option-card" id="optionImport">
            <div class="option-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            </div>
            <h3 class="option-title">Import CV</h3>
            <p class="option-desc">Paste a CV and let the builder structure it automatically</p>
          </button>

          <button class="option-card" id="optionScratch">
            <div class="option-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
            </div>
            <h3 class="option-title">Start from Scratch</h3>
            <p class="option-desc">Build a new CV from a blank template</p>
          </button>

        </div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script type="module" src="js/auth-guard.js"></script>
  <!-- cv-store.js is a module (deferred) but dashboard.js is a classic
       script that runs immediately, so dashboard.js awaits this promise
       instead of touching window.CVStore directly (see cv-store.js). -->
  <script>window.cvStoreReady = new Promise(r => { window._resolveCVStoreReady = r; });</script>
  <script type="module" src="js/cv-store.js"></script>
  <script src="js/parser.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
