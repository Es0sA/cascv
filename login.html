<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CAS CV Builder — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
</head>
<body class="page-login">

  <div class="login-wrap">

    <div class="login-brand">
      <span class="brand-cas">CAS</span>
      <span class="brand-divider"></span>
      <span class="brand-sub">CV Builder</span>
    </div>

    <div class="login-card">
      <h1 class="login-heading">Welcome back</h1>
      <p class="login-caption">Sign in to manage your CVs</p>

      <div class="login-form">

        <div class="field-group">
          <label class="field-label" for="username">Email</label>
          <input class="field-input" type="email" id="username" placeholder="Enter email" autocomplete="username">
        </div>

        <div class="field-group">
          <label class="field-label" for="password">Password</label>
          <div class="field-password">
            <input class="field-input" type="password" id="password" placeholder="••••••••" autocomplete="current-password">
            <button class="password-toggle" id="togglePwd" type="button" aria-label="Toggle password visibility">
              <svg id="eyeOpen" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg id="eyeClosed" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
        </div>

        <p class="error-msg" id="errorMsg" aria-live="polite"></p>

        <button class="btn-signin" id="signinBtn" type="button">
          <span id="btnText">Sign In</span>
          <svg id="btnArrow" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </button>

      </div>
    </div>

    <p class="login-footer">CAS Writing Services &copy; 2026</p>

  </div>

  <script type="module" src="js/auth.js"></script>
</body>
</html>
